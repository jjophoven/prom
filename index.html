<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Golden Hour Prom Seating</title>

<style>
    * {
        box-sizing: border-box;
    }

    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(to bottom, #f5d7a1, #c89b5a);
        color: #4b3a1a;
        text-align: center;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
    }

    .container {
        width: 100%;
        max-width: 500px;
    }

    h1 {
        font-size: clamp(1.8rem, 5vw, 2.5rem);
        margin-bottom: 10px;
    }

    p {
        margin-bottom: 20px;
        font-size: 1rem;
    }

    .input-row {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: center;
    }

    input {
        flex: 1;
        min-width: 200px;
        padding: 14px;
        font-size: 16px;
        border: none;
        border-radius: 10px;
        outline: none;
    }

    button {
        padding: 14px 18px;
        font-size: 16px;
        border: none;
        border-radius: 10px;
        background: #b8892d;
        color: white;
        cursor: pointer;
        transition: 0.2s;
        white-space: nowrap;
    }

    button:hover {
        background: #9e7424;
    }

    #result {
        margin-top: 25px;
        font-size: 1.4rem;
        font-weight: bold;
    }

    .card {
        margin-top: 15px;
        padding: 22px;
        border-radius: 16px;
        background: rgba(255,255,255,0.25);
        backdrop-filter: blur(10px);
        box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        display: inline-block;
        min-width: 200px;
    }

    /* MOBILE TWEAKS */
    @media (max-width: 480px) {
        body {
            padding: 15px;
        }

        .input-row {
            flex-direction: column;
        }

        input, button {
            width: 100%;
        }

        button {
            margin-left: 0;
        }
    }

    .credit {
        position: fixed;
        bottom: 10px;
        left: 0;
        width: 100%;
        text-align: center;
        font-size: 0.8rem;
        opacity: 0.6;
        pointer-events: none; /* prevents it from blocking clicks */
    }
</style>
</head>

<body>

<div class="container">
    <h1>Golden Hour Prom Seating</h1>
    <p>Type your name to find your table</p>

    <div class="input-row">
        <input id="nameInput" placeholder="Enter your name...">
        <button onclick="findTable()">Find Table</button>
    </div>

    <div id="result"></div>

    <div class="credit">
        Made by Jacob Ophoven
    </div>
</div>

<script>
const seating = {
    "Table 1": ["Audrey O.","Ella F.","Adelaide H.","Jessica W.","Ashley A.","Dania Z.","Dakota L."],
    "Table 2": ["Grace T.","Madison S.","Zach V.","Liv S.","Evelyn S.","Nathan V.","Isaac Z.","Madison T."],
    "Table 3": ["Raynah B.","Sophia H.","Colton J.","Lucy F.","Malena B.","Abby H.","Megan S.","Ady H."],
    "Table 4": ["Aaron C.","Clayton M.","Aidan D.","Mason K.","Charlie G.","Jojo C.","Alex P.","Beckett S."],
    "Table 5": ["Derek M.","Andre Y.","Cade F.","Dane P.","Chris L.","Quinton B.","Deandre M.","Stetson B."],
    "Table 6": ["Ari B.","Grayson P.","Brenden M.","Jacob R.","Luke E.","Jacob O.","Josiah M.","Graham P."],
    "Table 7": ["Henry G.","Gage J.","Adelle G.","Will S.","Jesse H.","Camden B.","Evan G.","Haven H."],
    "Table 8": ["Joshua P.","Colin B.","Cash L.","Magnus J.","Tanner R.","Parker S.","Graham F."],
    "Table 9": ["Faith B.","Jayden G.","Montana J.","Liam K.","Lissa J.","Ashley S.","Brooke S.","Adam S."],
    "Table 10": ["Leah W.","Claire F.","Lacey D.","Elianna C.","Hayley F.","Kyra K.","Alyssa R.","Brandon L."],
    "Table 11": ["Hope A.","Allegra D.","Ben D.","Anaya E.","Bhagwat S.","Leighla C.","Riley M.","Anthony Z."],
    "Table 12": ["Megan G.","Wren F.","Jett B.","Keilan K.","Brody S.","Tyler O.","Jonah Z.","Samuel S."],
    "Table 13": ["Jacob E.","Claire M.","Kip C.","Owen M.","Angela N.","Malachi C.","Novia A.","Andy M."],
    "Table 14": ["Lauren D.","Bella D.","Grace T.","Ella B.","Georgia F.","Layla K.","Aria B."],
    "Table 15": ["Grace L.","Avery B.","Amelia H.","Serena M.","Amelia M.","Sara M.","Reisa H."],
    "Table 16": ["Cain L.","Brennen B.","Elijah A.","Iris B.","Timmy F.","Jonathan V."]
};

function editDistance(a, b) {
    a = a.toLowerCase();
    b = b.toLowerCase();

    const dp = Array(a.length + 1).fill(null).map(() =>
        Array(b.length + 1).fill(0)
    );

    for (let i = 0; i <= a.length; i++) dp[i][0] = i;
    for (let j = 0; j <= b.length; j++) dp[0][j] = j;

    for (let i = 1; i <= a.length; i++) {
        for (let j = 1; j <= b.length; j++) {
            const cost = a[i - 1] === b[j - 1] ? 0 : 1;

            dp[i][j] = Math.min(
                dp[i - 1][j] + 1,     // delete
                dp[i][j - 1] + 1,     // insert
                dp[i - 1][j - 1] + cost // replace
            );
        }
    }

    return dp[a.length][b.length];
}

function extractNameParts(str) {
    const cleaned = str
        .toLowerCase()
        .replace(/[^a-z\s]/g, "")
        .trim()
        .split(/\s+/);

    return {
        first: cleaned[0] || "",
        initial: cleaned[1] ? cleaned[1][0] : ""
    };
}
function scoreMatch(input, name) {
    const inputParts = extractNameParts(input);
    const nameParts = extractNameParts(name);

    let score = 0;

    // Exact first name
    if (inputParts.first === nameParts.first) {
        score += 6;
    } else {
        // Fuzzy match (allow 1–2 letter mistakes)
        const dist = editDistance(inputParts.first, nameParts.first);

        if (dist === 1) score += 5;
        else if (dist === 2) score += 3;
    }

    // Prefix match
    if (nameParts.first.startsWith(inputParts.first)) {
        score += 2;
    }

    // Initial match
    if (inputParts.initial && inputParts.initial === nameParts.initial) {
        score += 4;
    }

    return score;
}

function findTable() {
    const input = document.getElementById("nameInput").value.trim().toLowerCase();
    if (!input) return;

    let bestMatch = null;
    let bestScore = 0;

    for (const table in seating) {
        for (const name of seating[table]) {
            let score = scoreMatch(input, name);

            if (score > bestScore) {
                bestScore = score;
                bestMatch = { name, table };
            }
        }
    }

    const resultDiv = document.getElementById("result");

    if (bestScore >= 3) {
        // Get everyone at the same table except the matched person
        const tableMates = seating[bestMatch.table]
            .filter(n => n !== bestMatch.name)
            .map(n => `<div>${n}</div>`)
            .join("");

        resultDiv.innerHTML = `
            <div class="card">
                <div style="font-size:1.1em; margin-bottom:5px;">
                    ${bestMatch.name}
                </div>
                <div style="font-size:1.6em; margin-bottom:15px;">
                    ${bestMatch.table}
                </div>

                <div style="font-size:0.9em; opacity:0.8; margin-bottom:5px;">
                    You're sitting with:
                </div>

                <div style="font-size:0.9em;">
                    ${tableMates}
                </div>
            </div>
        `;
    } else {
        resultDiv.innerHTML = "Name not found 😕";
    }
}
</script>

</body>
</html>
