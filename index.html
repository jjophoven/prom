<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Golden Hour Prom Seating</title>

<style>
    * {
        box-sizing: border-box;
    }

    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(to bottom, #f5d7a1, #c89b5a);
        color: #4b3a1a;
        text-align: center;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
    }

    .container {
        width: 100%;
        max-width: 500px;
    }

    h1 {
        font-size: clamp(1.8rem, 5vw, 2.5rem);
        margin-bottom: 10px;
    }

    p {
        margin-bottom: 20px;
        font-size: 1rem;
    }

    .input-row {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: center;
    }

    input {
        flex: 1;
        min-width: 200px;
        padding: 14px;
        font-size: 16px;
        border: none;
        border-radius: 10px;
        outline: none;
    }

    button {
        padding: 14px 18px;
        font-size: 16px;
        border: none;
        border-radius: 10px;
        background: #b8892d;
        color: white;
        cursor: pointer;
        transition: 0.2s;
        white-space: nowrap;
    }

    button:hover {
        background: #9e7424;
    }

    #result {
        margin-top: 25px;
        font-size: 1.4rem;
        font-weight: bold;
    }

    .card {
        margin-top: 15px;
        padding: 22px;
        border-radius: 16px;
        background: rgba(255,255,255,0.25);
        backdrop-filter: blur(10px);
        box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        display: inline-block;
        min-width: 200px;
    }

    /* MOBILE TWEAKS */
    @media (max-width: 480px) {
        body {
            padding: 15px;
        }

        .input-row {
            flex-direction: column;
        }

        input, button {
            width: 100%;
        }

        button {
            margin-left: 0;
        }
    }
</style>
</head>

<body>

<div class="container">
    <h1>Golden Hour Prom Seating</h1>
    <p>Type your name to find your table</p>

    <div class="input-row">
        <input id="nameInput" placeholder="Enter your name...">
        <button onclick="findTable()">Find Table</button>
    </div>

    <div id="result"></div>
</div>

<script>
const seating = {
    "Table 1": ["Audrey O.","Ella F.","Adelaide H.","Jessica W.","Ashley A.","Dania Z.","Dakota L."],
    "Table 2": ["Grace T.","Madison S.","Zach V.","Liv S.","Evelyn S.","Nathan V.","Isaac Z.","Madison T."],
    "Table 3": ["Raynah B.","Sophia H.","Colton J.","Lucy F.","Malena B.","Abby H.","Megan S.","Ady H."],
    "Table 4": ["Aaron C.","Clayton M.","Aidan D.","Mason K.","Charlie G.","Jojo C.","Alex P.","Beckett S."],
    "Table 5": ["Derek M.","Andre Y.","Cade F.","Dane P.","Chris L.","Quinton B.","Deandre M.","Stetson B."],
    "Table 6": ["Ari B.","Grayson P.","Brendan M.","Jacob R.","Luke E.","Jacob O.","Josiah M.","Graham P."],
    "Table 7": ["Henry G.","Gage J.","Adelle G.","Will S.","Jesse H.","Camden B.","Evan G.","Haven H."],
    "Table 8": ["Joshua P.","Jonathan V.","Colin B.","Cash L.","Magnus J.","Tanner R.","Parker S.","Graham F."],
    "Table 9": ["Faith B.","Jayden G.","Montana J.","Liam K.","Lissa J.","Ashley S.","Brooke S.","Adam S."],
    "Table 10": ["Leah W.","Claire F.","Lacey D.","Elianna C.","Hayley F.","Kyra K.","Alyssa R.","Brandon L."],
    "Table 11": ["Hope A.","Allegra D.","Ben D.","Anaya E.","Bhagwat S.","Leighla C.","Riley M.","Anthony Z."],
    "Table 12": ["Megan G.","Wren F.","Jett B.","Keilan K.","Brody S.","Tyler O.","Jonah Z.","Samuel S."],
    "Table 13": ["Jacob E.","Claire M.","Kip C.","Owen M.","Angela N.","Malachi C.","Novia A.","Andy M."],
    "Table 14": ["Lauren D.","Bella D.","Grace T.","Ella B.","Georgia F.","Layla K.","Aria B."],
    "Table 15": ["Grace L.","Avery B.","Amelia H.","Serena M.","Amelia M.","Sara M.","Reisa H."],
    "Table 16": ["Cain L.","Brennen B.","Elijah A.","Iris B.","Timmy F."]
};

function normalize(str) {
    return str
        .toLowerCase()
        .replace(/[^a-z\s]/g, "")   // remove punctuation (like periods)
        .trim()
        .split(/\s+/);             // split into words
}

function scoreMatch(input, name) {
    const inputParts = normalize(input);
    const nameParts = normalize(name);

    let score = 0;

    // exact full match boost
    if (inputParts.join(" ") === nameParts.join(" ")) {
        return 100;
    }

    for (let ip of inputParts) {
        for (let np of nameParts) {
            // exact match
            if (ip === np) score += 5;

            // prefix match (jo -> john)
            else if (np.startsWith(ip)) score += 3;

            // substring match
            else if (np.includes(ip)) score += 2;

            // initials match (j matches john)
            else if (ip.length === 1 && np[0] === ip) score += 1;
        }
    }

    return score;
}
function findTable() {
    const input = document.getElementById("nameInput").value.trim().toLowerCase();
    if (!input) return;

    let bestMatch = null;
    let bestScore = 0;

    for (const table in seating) {
        for (const name of seating[table]) {
            let score = scoreMatch(input, name);

            if (score > bestScore) {
                bestScore = score;
                bestMatch = { name, table };
            }
        }
    }

    const resultDiv = document.getElementById("result");

    if (bestScore >= 2) {
        // Get everyone at the same table except the matched person
        const tableMates = seating[bestMatch.table]
            .filter(n => n !== bestMatch.name)
            .map(n => `<div>${n}</div>`)
            .join("");

        resultDiv.innerHTML = `
            <div class="card">
                <div style="font-size:1.1em; margin-bottom:5px;">
                    ${bestMatch.name}
                </div>
                <div style="font-size:1.6em; margin-bottom:15px;">
                    ${bestMatch.table}
                </div>

                <div style="font-size:0.9em; opacity:0.8; margin-bottom:5px;">
                    You're sitting with:
                </div>

                <div style="font-size:0.9em;">
                    ${tableMates}
                </div>
            </div>
        `;
    } else {
        resultDiv.innerHTML = "Name not found 😕";
    }
}
</script>

</body>
</html>
